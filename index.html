<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f4f7fb; color: #333333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2.2rem; font-weight: 800; color: #0056B3; letter-spacing: -0.5px; }
    header p { font-size: 0.95rem; color: #666; margin-top: 6px; }
    .card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0, 86, 179, 0.08); padding: 36px; width: 100%; max-width: 560px; margin-bottom: 24px; }
    .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #0056B3; margin-bottom: 14px; }
    .gender-group { display: flex; gap: 12px; margin-bottom: 24px; }
    .gender-btn { flex: 1; padding: 12px; border: 2px solid #e0e8f5; border-radius: 12px; background: #fff; color: #555; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .gender-btn:hover { border-color: #0056B3; color: #0056B3; }
    .gender-btn.active { background: #0056B3; border-color: #0056B3; color: #fff; box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3); }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.8rem; font-weight: 600; color: #555; }
    .input-group input { padding: 12px 14px; border: 2px solid #e0e8f5; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.95rem; color: #333; outline: none; transition: border-color 0.2s; }
    .input-group input:focus { border-color: #0056B3; }
    .freq-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .freq-option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 2px solid #e0e8f5; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .freq-option:hover { border-color: #0056B3; background: #f0f5ff; }
    .freq-option.active { border-color: #0056B3; background: #eef4ff; }
    .freq-option input[type="radio"] { display: none; }
    .freq-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .freq-option.active .freq-dot { border-color: #0056B3; background: #0056B3; }
    .freq-option.active .freq-dot::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    .freq-label { flex: 1; }
    .freq-label strong { display: block; font-size: 0.9rem; color: #333; }
    .freq-label span { font-size: 0.78rem; color: #888; }
    .freq-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; background: #e0e8f5; color: #0056B3; }
    .freq-option.active .freq-badge { background: #0056B3; color: #fff; }
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 2px solid #e0e8f5; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .checkbox-item:hover { border-color: #0056B3; background: #f0f5ff; }
    .checkbox-item.active { border-color: #0056B3; background: #eef4ff; }
    .checkbox-item input[type="checkbox"] { display: none; }
    .custom-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .checkbox-item.active .custom-check { background: #0056B3; border-color: #0056B3; }
    .checkbox-item.active .custom-check::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
    .checkbox-item span { font-size: 0.9rem; font-weight: 500; color: #333; }
    .btn-calc { width: 100%; padding: 16px; background: #0056B3; color: #fff; border: none; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(0, 86, 179, 0.3); }
    .btn-calc:hover { background: #004494; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 86, 179, 0.4); }
    .result-card { display: none; background: #ffffff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0, 86, 179, 0.12); padding: 36px; width: 100%; max-width: 560px; border-top: 5px solid #0056B3; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .result-card.show { display: block; }
    .result-main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .result-box { background: #f4f7fb; border-radius: 14px; padding: 18px; text-align: center; }
    .result-box.highlight { background: #0056B3; color: #fff; grid-column: 1 / -1; }
    .result-box .value { font-size: 2rem; font-weight: 800; color: #0056B3; line-height: 1; }
    .result-box.highlight .value { color: #fff; font-size: 2.4rem; }
    .macro-bars { display: flex; flex-direction: column; gap: 12px; }
    .bar-bg { height: 8px; background: #e0e8f5; border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
    .bar-prot { background: #0056B3; }
    .bar-fat  { background: #f59e0b; }
    .bar-carb { background: #10b981; }
  </style>
</head>
<body>
  <header><h1>⚡ Calculadora de Elite</h1><p>Descubra suas calorias e macros com precisão profissional</p></header>
  <div class="card">
    <div class="section-title">Sexo Biológico</div>
    <div class="gender-group">
      <button class="gender-btn active" id="btn-male" onclick="selectGender('male')">♂ Masculino</button>
      <button class="gender-btn" id="btn-female" onclick="selectGender('female')">♀ Feminino</button>
    </div>
    <div class="section-title">Dados Físicos</div>
    <div class="input-grid">
      <div class="input-group"><label>Idade (anos)</label><input type="number" id="age" placeholder="Ex: 28"></div>
      <div class="input-group"><label>Peso (kg)</label><input type="number" id="weight" placeholder="Ex: 80"></div>
      <div class="input-group" style="grid-column: 1 / -1;"><label>Altura (cm)</label><input type="number" id="height" placeholder="Ex: 175"></div>
    </div>
    <div class="section-title">Frequência Semanal</div>
    <div class="freq-group">
      <label class="freq-option active" onclick="selectFreq(this, 1.2)"><input type="radio" name="freq" checked><div class="freq-dot"></div><div class="freq-label"><strong>Base de Operações</strong><span>0–1 dia</span></div></label>
      <label class="freq-option" onclick="selectFreq(this, 1.375)"><input type="radio" name="freq"><div class="freq-dot"></div><div class="freq-label"><strong>Em Treinamento</strong><span>2–3 dias</span></div></label>
      <label class="freq-option" onclick="selectFreq(this, 1.55)"><input type="radio" name="freq"><div class="freq-dot"></div><div class="freq-label"><strong>Ritmo de Combate</strong><span>4–5 dias</span></div></label>
      <label class="freq-option" onclick="selectFreq(this, 1.725)"><input type="radio" name="freq"><div class="freq-dot"></div><div class="freq-label"><strong>Padrão de Elite</strong><span>6+ dias</span></div></label>
    </div>
    <div class="section-title">Especialidades</div>
    <div class="checkbox-group">
      <label class="checkbox-item" id="chk-run" onclick="toggleCheck('chk-run')"><input type="checkbox">🏃 Corrida 4km</label>
      <label class="checkbox-item" id="chk-gym" onclick="toggleCheck('chk-gym')"><input type="checkbox">🏋️ Musculação</label>
    </div>
    <button class="btn-calc" onclick="calculate()">Calcular Meus Macros →</button>
  </div>
  <div class="result-card" id="result-card">
    <div class="result-main">
      <div class="result-box"><div class="value" id="res-tdee">—</div><div class="unit">TDEE (kcal)</div></div>
      <div class="result-box highlight"><div class="value" id="res-target">—</div><div class="unit">Meta Calórica (Perda)</div></div>
    </div>
    <div class="macro-bars">
      <div class="macro-item">🥩 Proteína: <span id="res-prot">—</span><div class="bar-bg"><div class="bar-fill bar-prot" id="bar-prot" style="width:0%"></div></div></div>
      <div class="macro-item">🥑 Gordura: <span id="res-fat">—</span><div class="bar-bg"><div class="bar-fill bar-fat" id="bar-fat" style="width:0%"></div></div></div>
      <div class="macro-item">🍚 Carbos: <span id="res-carb">—</span><div class="bar-bg"><div class="bar-fill bar-carb" id="bar-carb" style="width:0%"></div></div></div>
    </div>
  </div>
  <script>
    let selectedGender = 'male'; let selectedFactor = 1.2;
    function selectGender(g) { selectedGender = g; document.getElementById('btn-male').classList.toggle('active', g === 'male'); document.getElementById('btn-female').classList.toggle('active', g === 'female'); }
    function selectFreq(el, factor) { selectedFactor = factor; document.querySelectorAll('.freq-option').forEach(o => o.classList.remove('active')); el.classList.add('active'); }
    function toggleCheck(id) { document.getElementById(id).classList.toggle('active'); }
    function calculate() {
      const age = parseFloat(document.getElementById('age').value); const weight = parseFloat(document.getElementById('weight').value); const height = parseFloat(document.getElementById('height').value);
      if (!age || !weight || !height) { alert('Preencha tudo!'); return; }
      let bmr = (selectedGender === 'male') ? (10 * weight + 6.25 * height - 5 * age + 5) : (10 * weight + 6.25 * height - 5 * age - 161);
      const bonus = (document.getElementById('chk-run').classList.contains('active') ? 200 : 0) + (document.getElementById('chk-gym').classList.contains('active') ? 150 : 0);
      const tdee = Math.round(bmr * selectedFactor + bonus); 
      const target = tdee - 500;
      const prot = Math.round(weight * 2); 
      const fat = Math.round(weight * 1);
      const carb = Math.round((target - (prot * 4) - (fat * 9)) / 4);
      document.getElementById('res-tdee').textContent = tdee; 
      document.getElementById('res-target').textContent = target;
      document.getElementById('res-prot').textContent = prot + 'g'; 
      document.getElementById('res-fat').textContent = fat + 'g'; 
      document.getElementById('res-carb').textContent = carb + 'g';
      document.getElementById('bar-prot').style.width = '30%'; 
      document.getElementById('bar-fat').style.width = '30%'; 
      document.getElementById('bar-carb').style.width = '40%';
      document.getElementById('result-card').classList.add('show');
    }
  </script>
</body>
</html>
